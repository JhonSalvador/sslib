<header class="fixed left-0 top-0 z-50 w-full border-b transition-all duration-300"
  [style.background-color]="isScrolled ? 'rgba(2, 6, 23, 0.92)' : 'transparent'"
  [style.border-bottom-color]="isScrolled ? 'rgba(255, 255, 255, 0.10)' : 'transparent'"
  [style.backdrop-filter]="isScrolled ? 'blur(16px)' : 'none'"
  [style.box-shadow]="isScrolled ? '0 10px 30px rgba(15, 23, 42, 0.35)' : 'none'">
  <div class="mx-auto flex max-w-7xl items-center justify-between px-6 py-4">
    <button type="button" class="flex items-center gap-3" (click)="scrollToTop()" aria-label="Voltar para o topo">
      <img [src]="profile.logo" [alt]="profile.initials" class="h-11 w-11 rounded-xl object-cover cursor-pointer" />
    </button>

    <nav class="hidden items-center gap-8 text-sm text-slate-200 md:flex">
      @for (item of menuItems; track item.target) {
      <button type="button"
        class="relative no-underline text-[90%] font-semibold tracking-[2px] cursor-pointer after:content-[''] after:absolute after:left-0 after:bottom-[-10px] after:h-[2px] after:w-full after:bg-blue-200 after:scale-x-0 after:origin-bottom-right after:transition-transform after:duration-300 after:ease-out hover:after:scale-x-100 hover:after:origin-bottom-left text-white hover:text-blue-200 transition"
        (click)="scrollToSection(item.target)">
        {{ item.label }}
      </button>
      }
    </nav>
  </div>
</header>
