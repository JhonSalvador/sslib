@if (showContentLimit()) {
  <div
    class="pointer-events-none fixed left-0 top-0 z-40 w-full bg-slate-950 transition-opacity duration-300"
    style="height: 106px;"
  >
    <div class="absolute bottom-0 left-0 h-px w-full bg-blue-400/40 shadow-[0_0_20px_rgba(96,165,250,0.45)]"></div>
  </div>
}

<header
  class="fixed left-0 top-0 z-50 w-full transition-all duration-300"
  [style.background-color]="isScrolled() || isMenuOpen() ? 'rgba(2, 6, 23, 0.88)' : 'transparent'"
  [style.backdrop-filter]="isScrolled() || isMenuOpen() ? 'blur(18px)' : 'blur(9px)'"
  [style.box-shadow]="isScrolled() || isMenuOpen() ? '0 18px 45px rgba(2, 6, 23, 0.45)' : 'none'"
>
  <div class="mx-auto flex max-w-7xl items-center justify-between px-6 py-4">
    <button
      type="button"
      class="flex items-center gap-3"
      (click)="scrollToTop()"
      aria-label="Voltar para o topo"
    >
      <img
        [src]="profile.logo"
        [alt]="profile.initials"
        class="h-11 w-11 rounded-2xl object-cover"
      />
    </button>

    <nav class="hidden items-center gap-8 text-sm text-slate-200 md:flex">
      @for (item of menuItems; track item.target) {
        <button
          type="button"
          class="relative no-underline text-[90%] font-semibold tracking-[2px] cursor-pointer after:content-[''] after:absolute after:left-0 after:bottom-[-10px] after:h-[2px] after:w-full after:bg-blue-200 after:scale-x-0 after:origin-bottom-right after:transition-transform after:duration-300 after:ease-out hover:after:scale-x-100 hover:after:origin-bottom-left text-white hover:text-blue-200 transition"
          (click)="scrollToSection(item.target)"
        >
          {{ item.label }}
        </button>
      }
    </nav>

    <button
      type="button"
      class="relative z-[70] rounded-full bg-white/10 px-5 py-2 text-sm font-semibold text-white backdrop-blur transition hover:bg-blue-500/20 md:hidden"
      (click)="toggleMenu()"
      aria-label="Abrir ou fechar menu"
    >
      @if (isMenuOpen()) {
        Fechar
      } @else {
        Menu
      }
    </button>
  </div>
</header>

@if (isMenuOpen()) {
  <div class="fixed inset-0 z-[60] flex items-center justify-center bg-slate-950/95 px-6 text-white backdrop-blur-2xl md:hidden">
    <div class="w-full max-w-sm text-center">
      <div class="mb-12 flex flex-col items-center">
        <img
          [src]="profile.logo"
          [alt]="profile.initials"
          class="h-20 w-20 rounded-3xl object-cover shadow-2xl shadow-blue-500/20"
        />
      </div>

      <nav class="flex flex-col items-center gap-6">
        @for (item of menuItems; track item.target) {
          <button
            type="button"
            class="border rounded-xl min-w-full border-blue-400 p-4 text-2xl font-black text-white transition duration-300 hover:scale-105 hover:text-blue-400"
            (click)="scrollToSection(item.target)"
          >
            {{ item.label }}
          </button>
        }
      </nav>

      <p class="mt-14 text-xs uppercase tracking-[0.3em] text-slate-500">
        Angular • Tailwind • TypeScript
      </p>
    </div>
  </div>
}
