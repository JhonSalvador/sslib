<section id="contato" class="min-h-screen px-6 py-24">
  <div class="mx-auto max-w-4xl rounded-3xl border border-white/10 bg-white/[0.03] p-8 text-center md:p-12">
    <p class="text-sm font-semibold uppercase tracking-[0.3em] text-blue-400">
      Contato
    </p>

    <h2 class="mt-3 text-4xl font-bold text-white">
      Vamos conversar?
    </h2>

    <p class="mx-auto mt-5 max-w-2xl leading-8 text-slate-400">
      Entre em contato para conhecer meus projetos, acompanhar minha evolução
      ou conversar sobre desenvolvimento web.
    </p>

    <div class="mt-8 flex flex-wrap justify-center gap-4">
      <a
        [href]="'mailto:' + contact.email"
        class="rounded-xl bg-blue-500 px-6 py-3 text-sm font-semibold text-white transition hover:bg-blue-400"
      >
        Enviar e-mail
      </a>

      <a
        [href]="contact.github"
        target="_blank"
        rel="noopener noreferrer"
        class="rounded-xl border border-white/15 px-6 py-3 text-sm font-semibold text-white transition hover:border-blue-400 hover:text-blue-400"
      >
        GitHub
      </a>

      <a
        [href]="contact.linkedin"
        target="_blank"
        rel="noopener noreferrer"
        class="rounded-xl border border-white/15 px-6 py-3 text-sm font-semibold text-white transition hover:border-blue-400 hover:text-blue-400"
      >
        LinkedIn
      </a>
    </div>
  </div>
</section>
