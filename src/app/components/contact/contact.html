<section id="contato" class="min-h-max px-6 py-24">
  <div class="mx-auto max-w-4xl rounded-3xl border border-white/10 bg-white/[0.03] p-8 text-center md:p-12">
    <p class="text-sm font-semibold uppercase tracking-[0.3em] text-blue-400">
      Contato
    </p>

    <h2 class="mt-3 text-4xl font-bold text-white">
      Vamos conversar?
    </h2>

    <p class="mx-auto mt-5 max-w-2xl leading-8 text-slate-400">
      Entre em contato para conhecer meus projetos, acompanhar minha evolução
      ou conversar sobre desenvolvimento web.
    </p>

    <div class="mt-8 flex flex-wrap justify-center gap-4">
      <a [href]="'mailto:' + contact.email"
        class="flex flex-row items-center gap-2 rounded-xl border border-white/15 px-6 py-3 text-sm font-semibold text-white transition hover:border-red-600 hover:text-red-400  ">
        <i class="fi fi-rr-envelope leading-0"></i>
        <span class="">E-mail</span>
      </a>

      <a [href]="contact.github" target="_blank" rel="noopener noreferrer"
        class="flex flex-row items-center gap-2 rounded-xl border border-white/15 px-6 py-3 text-sm font-semibold text-white transition hover:border-gray-600 hover:text-gray-400">
        <i class="fi fi-brands-github leading-0"></i>
        <span class="">GitHub</span>
      </a>

      <a [href]="contact.linkedin" target="_blank" rel="noopener noreferrer"
        class="flex flex-row items-center gap-2 rounded-xl border border-white/15 px-6 py-3 text-sm font-semibold text-white transition hover:border-blue-600 hover:text-blue-400">
        <i class="fi fi-brands-linkedin leading-0"></i>
        <span class="">LinkedIn</span>
      </a>

      <a [href]="contact.instagram" target="_blank" rel="noopener noreferrer"
        class="flex flex-row items-center gap-2 rounded-xl border border-white/15 px-6 py-3 text-sm font-semibold text-white transition hover:border-pink-600 hover:text-pink-400">
        <i class="fi fi-brands-instagram leading-0"></i>
        <span class="">Instagram</span>
      </a>
    </div>
  </div>
</section>
