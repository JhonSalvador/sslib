<section id="tecnologias" class="min-h-screen bg-slate-900/60 px-6 py-24">
  <div class="mx-auto max-w-7xl">
    <div class="mb-12">
      <p class="text-sm font-semibold uppercase tracking-[0.3em] text-blue-400">
        Conhecimentos
      </p>

      <h2 class="mt-3 text-4xl font-bold text-white">
        Linguagens e tecnologias
      </h2>
    </div>

    <div class="grid gap-5 sm:grid-cols-2 lg:grid-cols-3">
      <article
        *ngFor="let skill of skills"
        class="rounded-2xl border border-white/10 bg-slate-950 p-6 transition hover:-translate-y-1 hover:border-blue-400/50 hover:shadow-xl hover:shadow-blue-500/10"
      >
        <h3 class="text-2xl font-bold text-white">
          {{ skill.name }}
        </h3>

        <p class="mt-3 text-slate-400">
          {{ skill.description }}
        </p>
      </article>
    </div>
  </div>
</section>
