<section id="home" class="fixed z-[-1] inset-0 flex min-h-screen items-center">
  <div class="absolute w-screen inset-0 bg-cover bg-center bg-no-repeat"
    [style.background-image]="'url(' + profile.background + ')'"></div>

  <div class="mx-auto z-0 grid max-w-7xl items-center gap-10 lg:grid-cols-2">
    <div class="flex flex-col items-start">
      <p class="mb-4 text-sm font-semibold uppercase tracking-widest text-white">
        Portfólio pessoal
      </p>

      <h1 class="max-w-3xl text-5xl font-extrabold leading-tight text-white md:text-4xl">Hello World! <br>Eu sou o
        <span class="bg-linear-to-r from-blue-400 to-cyan-300 bg-clip-text text-transparent">
          {{ profile.name }}
        </span>
      </h1>
    </div>

    <div class="flex justify-center lg:justify-end">
      <div
        class="relative h-80 w-80 rounded-full border border-blue-400/30 bg-blue-500/5 p-3 shadow-2xl shadow-blue-500/20 md:h-[520px] md:w-[520px]">
        <div class="relative h-full w-full overflow-hidden rounded-full bg-slate-900">
          <img [src]="profile.photo" [alt]="profile.name" class="h-full w-full object-cover" />

          <div class="absolute inset-0 bg-linear-to-b from-transparent via-slate-950/5 to-slate-950"></div>

          <div class="absolute bottom-8 left-1/2 w-full -translate-x-1/2 px-8 text-center">
            <div
              class="mx-auto mb-4 flex h-16 w-16 items-center justify-center rounded-2xl bg-blue-500 text-2xl font-black text-white shadow-lg shadow-blue-500/30">
              {{ profile.initials }}
            </div>

            <p class="text-sm uppercase tracking-widest text-blue-300">
              Front-end & Infraestrutura
            </p>

            <p class="mt-2 text-sm text-slate-300">
              Angular • Mikrotik • Zabbix
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
