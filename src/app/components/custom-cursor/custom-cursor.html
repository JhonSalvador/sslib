<div class="custom-cursor-dot" [class.cursor-visible]="isVisible" [class.cursor-hover]="isHovering"
  [class.cursor-clicking]="isClicking" [style.transform]="'translate3d(' + x + 'px, ' + y + 'px, 0)'"></div>

<div class="custom-cursor-ring" [class.cursor-visible]="isVisible" [class.cursor-hover]="isHovering"
  [class.cursor-clicking]="isClicking" [style.transform]="'translate3d(' + x + 'px, ' + y + 'px, 0)'"></div>
