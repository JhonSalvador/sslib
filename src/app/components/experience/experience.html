<section id="experiencias" class="min-h-screen bg-slate-900/60 px-6 py-24">
  <div class="mx-auto max-w-7xl">
    <div class="mb-12">
      <p class="text-sm font-semibold uppercase tracking-[0.3em] text-blue-400">
        Trajetória
      </p>

      <h2 class="mt-3 text-4xl font-bold text-white">
        Onde trabalhei e estudei
      </h2>
    </div>

    <div class="grid gap-8 lg:grid-cols-2">
      <div>
        <h3 class="mb-6 text-2xl font-bold text-white">
          Experiência profissional
        </h3>

        <article data-cursor-hover *ngFor="let job of jobs"
          class="mb-6 overflow-hidden rounded-3xl border border-white/10 bg-slate-950">
          <img *ngIf="job.image" [src]="job.image" [alt]="job.place" class="h-56 w-full object-cover" />

          <div class="p-6">
            <h4 class="text-xl font-bold text-white">
              {{ job.title }}
            </h4>

            <p class="mt-2 text-blue-300">
              {{ job.place }}
            </p>

            <p class="mt-1 text-sm text-slate-500">
              {{ job.period }}
            </p>

            <p class="mt-4 leading-7 text-slate-400">
              {{ job.description }}
            </p>
          </div>
        </article>
      </div>

      <div>
        <h3 class="mb-6 text-2xl font-bold text-white">
          Formação e estudos
        </h3>

        <article data-cursor-hover *ngFor="let study of studies"
          class="mb-6 overflow-hidden rounded-3xl border border-white/10 bg-slate-950">
          <img *ngIf="study.image" [src]="study.image" [alt]="study.place" class="h-56 w-full object-cover" />

          <div class="p-6">
            <h4 class="text-xl font-bold text-white">
              {{ study.title }}
            </h4>

            <p class="mt-2 text-blue-300">
              {{ study.place }}
            </p>

            <p class="mt-1 text-sm text-slate-500">
              {{ study.period }}
            </p>

            <p class="mt-4 leading-7 text-slate-400">
              {{ study.description }}
            </p>
          </div>
        </article>
      </div>
    </div>
  </div>
</section>
