<section id="projetos" class="min-h-screen px-6 py-24">
  <div class="mx-auto max-w-7xl">
    <div class="mb-12">
      <p class="text-sm font-semibold uppercase tracking-widest text-blue-400">
        Portfólio
      </p>

      <h2 class="mt-4 text-4xl font-bold text-white">
        Projetos desenvolvidos
      </h2>
    </div>

    <div class="grid gap-8 lg:grid-cols-3">
      <article data-cursor-hover *ngFor="let project of projects"
        class="overflow-hidden rounded-3xl border border-white/10 bg-white/5 transition hover:-translate-y-2 hover:border-blue-400/50 hover:shadow-2xl hover:shadow-blue-500/10">
        <div class="h-56 bg-slate-900">
          <img draggable="false" *ngIf="project.image && !project.video" [src]="project.image" [alt]="project.title"
            class="h-full w-full object-cover" />

          <video draggable="false" *ngIf="project.video" [src]="project.video" class="h-full w-full object-cover" controls></video>

          <div *ngIf="!project.image && !project.video" class="flex h-full items-center justify-center bg-slate-900">
            <span class="text-slate-500">
              Sem mídia cadastrada
            </span>
          </div>
        </div>

        <div class="p-6">
          <h3 class="text-2xl font-bold text-white">
            {{ project.title }}
          </h3>

          <p class="mt-4 leading-7 text-slate-400">
            {{ project.description }}
          </p>

          <div class="border-t pt-4 border-slate-600 mt-5 flex flex-wrap gap-2">
            <span *ngFor="let tech of project.techs"
              class="rounded-full border border-blue-400/30 bg-blue-400/10 px-4 py-2 text-xs font-semibold text-blue-300">
              {{ tech }}
            </span>
          </div>

          <div class="mt-6">
            <a *ngIf="project.link" [href]="project.link" target="_blank" rel="noopener noreferrer"
              class="rounded-lg bg-blue-500 px-4 py-2 text-sm font-semibold text-white transition hover:bg-blue-400">
              Acessar
            </a>
          </div>
        </div>
      </article>
    </div>
  </div>
</section>
